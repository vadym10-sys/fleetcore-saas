services:
  - type: web
    name: fleetcore-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fleetcore-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: WEB_ORIGIN
        value: https://fleetcore-web.onrender.com
      - key: API_PUBLIC_URL
        value: https://fleetcore-api.onrender.com
      - key: PORT
        value: 4000

  - type: web
    name: fleetcore-web
    runtime: docker
    dockerfilePath: apps/web/Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://fleetcore-api.onrender.com
      - key: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
        sync: false

databases:
  - name: fleetcore-postgres
    plan: free
    databaseName: fleetcore
    user: fleetcore
