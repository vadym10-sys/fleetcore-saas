services:
  - type: web
    name: fleetcore-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fleetcore-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: WEB_ORIGIN
        sync: false
      - key: PORT
        value: 4000

  - type: web
    name: fleetcore-web
    runtime: docker
    dockerfilePath: apps/web/Dockerfile
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false

databases:
  - name: fleetcore-postgres
    plan: free
    databaseName: fleetcore
    user: fleetcore
