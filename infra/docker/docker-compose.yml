services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: fleetcore
      POSTGRES_PASSWORD: fleetcore
      POSTGRES_DB: fleetcore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../postgres/migrations:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
